name: SwiftDualNBackPrototype
options:
  minimumXcodeGenVersion: 2.37.0
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: io.dualnback.SwiftDualNBackPrototype
    SWIFT_VERSION: 5.10
targets:
  SwiftDualNBackPrototype:
    type: application
    platform: macOS
    sources:
      - Sources/SwiftDualNBackPrototype
    settings:
      base:
        PRODUCT_NAME: "Dual N-Back"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Dual N-Back"
        INFOPLIST_KEY_CFBundleName: "Dual N-Back"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
schemes:
  SwiftDualNBackPrototype:
    build:
      targets:
        SwiftDualNBackPrototype: all
    run:
      config: Debug
